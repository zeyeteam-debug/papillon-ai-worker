name: Copy Docker Image

on:
  repository_dispatch:
    types: [update-worker]

jobs:
  copy:
    runs-on: ubuntu-latest

    steps:
      - name: Install crane
        run: |
          curl -L https://github.com/google/go-containerregistry/releases/latest/download/go-containerregistry_Linux_x86_64.tar.gz | tar xz
          sudo mv crane /usr/local/bin/

      - name: Login to GHCR
        run: |
          echo "${{ secrets.GHCR_TOKEN }}" | crane auth login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Copy image
        run: |
          crane copy docker.io/zeyepapillon/papillon-ai-worker:latest ghcr.io/zeyeteam-debug/papillon-ai-worker:latest
          - name: Trigger worker repo
        run: |
          curl -X POST \
          -H "Authorization: token ${{ secrets.GHCR_TOKEN }}" \
          -H "Accept: application/vnd.github+json" \
          https://api.github.com/repos/zeyeteam-debug/papillon-ai-worker/dispatches \
          -d '{"event_type":"update_worker"}'
